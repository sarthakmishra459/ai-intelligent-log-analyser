services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: log_analysis
      POSTGRES_USER: log_analysis
      POSTGRES_PASSWORD: log_analysis
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U log_analysis -d log_analysis"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://log_analysis:log_analysis@postgres:5432/log_analysis
      EMBEDDING_PROVIDER: deterministic
      LLM_PROVIDER: rule_based
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
